---
apiVersion: v1
kind: ConfigMap
metadata:
  name: filebrowser-quantum-config-file
data:
  config.yaml: |
    server:
      port: 80
      database: /home/filebrowser/data/database.db
      cacheDir: /home/filebrowser/data/tmp
      sources:
        - path: /srv
          config:
            defaultEnabled: true
    auth:
      adminUsername: admin
